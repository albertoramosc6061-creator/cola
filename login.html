<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Folklore — Iniciar Sesión</title>
<style>
  :root {
    --bg: #0d0d12;
    --surface: #15151f;
    --surface2: #1c1c2a;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.18);
    --text: #e8e6f0;
    --muted: #9492a8;
    --accent: #c084fc;
    --accent2: #a855f7;
    --coral: #fb7185;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(160deg, rgba(10,8,16,0.78), rgba(8,6,12,0.88)),
      url('assets/fondo-login.jpg') center center / cover no-repeat fixed;
    position: relative;
    overflow: hidden;
    padding: 20px;
  }

  /* viñeta sutil para enfocar el formulario */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 45%, transparent 0%, rgba(5,4,8,0.55) 100%);
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 380px;
  }

  .brand {
    text-align: center;
    margin-bottom: 22px;
  }
  .brand-icon {
    font-size: 34px;
    margin-bottom: 8px;
    filter: drop-shadow(0 2px 10px rgba(192,132,252,0.4));
  }
  .brand h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }
  .brand p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.03em;
  }

  .login-card {
    background: rgba(21, 21, 31, 0.82);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 30px 28px 26px;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }

  .login-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .login-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .ic {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.7;
    pointer-events: none;
  }
  .form-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 11px 12px 11px 36px;
    color: var(--text);
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.12);
  }
  .form-group input::placeholder { color: #5e5c70; }

  .btn-login {
    width: 100%;
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, var(--accent2), #7e3ff2);
    transition: all 0.18s;
  }
  .btn-login:hover {
    filter: brightness(1.08);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(168,85,247,0.35);
  }
  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(251,113,133,0.12);
    border: 1px solid rgba(251,113,133,0.3);
    color: var(--coral);
    font-size: 12.5px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .error-msg.show { display: flex; }

  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .hint {
    text-align: center;
    margin-top: 18px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: #6b6980;
  }
</style>
</head>
<body>

  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">🪡</div>
      <h1>Atelier Folklore</h1>
      <p>Sistema de Confección · Acceso restringido</p>
    </div>

    <div class="login-card">
      <div class="login-title"><span class="dot"></span>Iniciar Sesión</div>

      <div class="error-msg" id="error-msg">
        <span>⚠️</span>
        <span>Usuario o contraseña incorrectos.</span>
      </div>

      <form id="login-form" autocomplete="off" onsubmit="return validarLogin(event)">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <div class="input-wrap">
            <span class="ic">👤</span>
            <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <div class="input-wrap">
            <span class="ic">🔒</span>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-login">🪡 Ingresar al Taller</button>
      </form>

      <div class="hint">Acceso exclusivo para personal del taller</div>
    </div>

    <div class="footer-note">v2.0 • La Paz, Bolivia</div>
  </div>

<script>
  // Credenciales válidas
  const USUARIO_VALIDO = 'homersimpson';
  const CLAVE_VALIDA = '123';

  function validarLogin(e) {
    e.preventDefault();
    const usuario = document.getElementById('usuario').value.trim();
    const clave = document.getElementById('contrasena').value;
    const errorMsg = document.getElementById('error-msg');
    const card = document.querySelector('.login-card');

    if (usuario === USUARIO_VALIDO && clave === CLAVE_VALIDA) {
      // Guarda la sesión y redirige al sistema
      sessionStorage.setItem('atelier_sesion', 'activa');
      sessionStorage.setItem('atelier_usuario', usuario);
      window.location.href = 'index.html';
    } else {
      errorMsg.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth; // reinicia animación
      card.classList.add('shake');
      document.getElementById('contrasena').value = '';
      document.getElementById('contrasena').focus();
    }
    return false;
  }

  // Si ya hay sesión activa, pasa directo al sistema
  if (sessionStorage.getItem('atelier_sesion') === 'activa') {
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
