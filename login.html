<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Confección — Iniciar Sesión</title>
<style>
  :root {
    --bg: #1e1611;
    --surface: #2a201a;
    --surface2: #352921;
    --border: rgba(245, 235, 224, 0.08);
    --border2: rgba(245, 235, 224, 0.15);
    --text: #f5ebe0;
    --muted: #a89a90;
    --accent: #d4a373;
    --accent2: #b58253;
    --coral: #e07a5f;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Se actualizó la ruta con tu archivo local 'fondo-login.jpg' */
    background:
      linear-gradient(160deg, rgba(30, 22, 17, 0.2), rgba(20, 14, 11, 0.3)),
      url('fondo-login.jpg') center center / cover no-repeat fixed;
    position: relative;
    overflow: hidden;
    padding: 20px;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 45%, transparent 0%, rgba(15, 10, 8, 0.6) 100%);
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 360px;
  }

  .brand {
    text-align: center;
    margin-bottom: 26px;
  }
  .brand h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
  .brand p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .login-card {
    background: rgba(42, 32, 26, 0.85);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 32px 28px;
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    box-shadow: 0 24px 64px rgba(0,0,0,0.65);
  }

  .login-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .login-title .dot {
    width: 5px; 
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text);
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.15);
  }
  .form-group input::placeholder { color: #6e5d53; }

  .btn-login {
    width: 100%;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 13px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: #1e1611;
    background: var(--accent);
    transition: all 0.2s;
  }
  .btn-login:hover {
    background: var(--accent2);
    color: #ffffff;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(181, 130, 83, 0.25);
  }
  .btn-login:active { transform: translateY(0); }

  .error-msg {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(224, 122, 95, 0.1);
    border: 1px solid rgba(224, 122, 95, 0.25);
    color: var(--coral);
    font-size: 12px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 18px;
  }
  .error-msg.show { display: flex; }

  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .hint {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: #5c4e46;
  }
</style>
</head>
<body>

  <div class="login-wrap">
    <div class="brand">
      <h1>TALLER DE CONFECCION</h1>
      <p>Sistema de Confección - Acceso restringido</p>
    </div>

    <div class="login-card">
      <div class="login-title"><span class="dot"></span>Iniciar Sesión</div>

      <div class="error-msg" id="error-msg">
        <span>Usuario o contraseña incorrectos.</span>
      </div>

      <form id="login-form" autocomplete="off" onsubmit="return validarLogin(event)">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login">Ingresar al Taller</button>
      </form>

      <div class="hint">Acceso exclusivo para personal del taller</div>
    </div>

    <div class="footer-note">Bienvenido</div>
  </div>

<script>
  const USUARIO_VALIDO = 'homersimpson';
  const CLAVE_VALIDA = '123';

  function validarLogin(e) {
    e.preventDefault();
    const usuario = document.getElementById('usuario').value.trim();
    const clave = document.getElementById('contrasena').value;
    const errorMsg = document.getElementById('error-msg');
    const card = document.querySelector('.login-card');

    if (usuario === USUARIO_VALIDO && clave === CLAVE_VALIDA) {
      sessionStorage.setItem('atelier_sesion', 'activa');
      sessionStorage.setItem('atelier_usuario', usuario);
      window.location.href = 'index.html';
    } else {
      errorMsg.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth; 
      card.classList.add('shake');
      document.getElementById('contrasena').value = '';
      document.getElementById('contrasena').focus();
    }
    return false;
  }

  if (sessionStorage.getItem('atelier_sesion') === 'activa') {
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
